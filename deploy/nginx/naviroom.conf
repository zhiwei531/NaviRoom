server {
    listen 80;
    server_name naviroom.cn www.naviroom.cn;

    # Redirect all HTTP traffic to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name naviroom.cn www.naviroom.cn;

    ssl_certificate     /etc/nginx/ssl/naviroom.cn/fullchain.crt;
    ssl_certificate_key /etc/nginx/ssl/naviroom.cn/privkey.key;

    # Reasonable TLS defaults
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # 前端静态文件
    root /var/www/naviroom;
    index index.html;

    # SPA：前端路由 /upload 等需要回退到 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 预留后端 API：未来你的后端服务监听 127.0.0.1:8000
    location /api/ {
        proxy_pass http://127.0.0.1:8000/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
